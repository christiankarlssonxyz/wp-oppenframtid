name: Deploy to Gandi

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via SFTP to Gandi
        env:
          SFTP_HOST: sftp.sd3.gpaas.net
          GANDI_USER: 8baeead0-2a83-11f1-b172-00163e94b645
          GANDI_PASSWORD: ${{ secrets.GANDI_SFTP_PASSWORD }}
          DEPLOY_PATH: lamp0/web/vhosts/christiankarlsson.xyz/htdocs/wp-content/themes/blogtree
        run: |
          lftp sftp://$GANDI_USER:$GANDI_PASSWORD@$SFTP_HOST -e "
            set sftp:auto-confirm yes;
            mkdir -p $DEPLOY_PATH;
            mirror --reverse --delete --verbose \
              --exclude '^\\.git/' \
              --exclude '^\\.github/' \
              ./ $DEPLOY_PATH/;
            bye"
